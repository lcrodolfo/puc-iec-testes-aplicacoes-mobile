# Gate genérico do CineHub — roda quando o capstone muda (push/PR).
# Não dá nota: só garante que o projeto está saudável (build/type/test verdes).
# Distribuição: este arquivo vai pra RAIZ do repo público; o capstone fica em capstone/.
name: capstone-ci

on:
  push:
    branches: [main]
    paths: ['capstone/**']
  pull_request:
    paths: ['capstone/**']

jobs:
  server:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: capstone/server
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: capstone/server/package-lock.json
      - run: npm ci
      - name: Typecheck
        run: npm run typecheck
      - name: Testes
        run: npm test
