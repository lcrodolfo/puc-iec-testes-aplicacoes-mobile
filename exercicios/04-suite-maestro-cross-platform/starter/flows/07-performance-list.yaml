appId: com.apptestesmobile
name: 07-performance-lista-longa
tags:
  - performance
  - avancado
---
# Categoria 5 — Performance: scroll de lista longa
# Mede que app não trava + render dos 100º+ itens
- launchApp:
    clearState: false
- tapOn:
    text: "Performance"
    optional: true
- tapOn:
    text: "Lista Longa"
    optional: true
- waitForAnimationToEnd
- assertVisible:
    text: "Item 1"
    optional: true
# Scroll agressivo — 5 swipes rápidos
- repeat:
    times: 5
    commands:
      - swipe:
          direction: UP
          duration: 200
- waitForAnimationToEnd
# Verifica que items posteriores foram renderizados
- assertVisible:
    text: "Item"
    optional: true
- takeScreenshot: lista-scroll
- back
- assertVisible:
    text: "Performance"
    optional: true
