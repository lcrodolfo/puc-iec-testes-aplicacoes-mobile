appId: com.apptestesmobile
name: 09-fragmento-login-reutilizavel
env:
  EMAIL: "user@teste.com"
  PASSWORD: "senha-forte-123"
tags:
  - funcional
  - avancado
  - fragments
---
# Demo: uso de fragmento `_fragments/login.yaml` com env vars.
# Fragmentos permitem DRY em suítes grandes.
- launchApp:
    clearState: false
# Reusa fragmento de login
- runFlow: _fragments/login.yaml
# Após login, continua teste específico
- assertVisible:
    text: "Funcional"
    optional: true
- takeScreenshot: pos-login
