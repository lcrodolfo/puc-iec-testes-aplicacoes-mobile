appId: com.apptestesmobile
name: 08-conditional-onboarding
tags:
  - usabilidade
  - avancado
  - conditional
---
# Demo: runFlow with `when:` condition
# Se aparecer onboarding (primeira execução), pular antes de seguir teste principal
- launchApp:
    clearState: true  # força primeira execução
# Conditional flow — só roda se onboarding visível
- runFlow:
    when:
      visible: "Pular"
    commands:
      - tapOn:
          text: "Pular"
          optional: true
      - waitForAnimationToEnd
# Após passar onboarding (ou sem onboarding), continua fluxo principal
- assertVisible:
    text: "Testes QA"
    optional: true
- takeScreenshot: home-apos-onboarding
