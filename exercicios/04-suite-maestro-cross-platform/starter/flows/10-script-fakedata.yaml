appId: com.apptestesmobile
name: 10-script-js-fakedata
tags:
  - funcional
  - avancado
  - script
---
# Demo: runScript com JavaScript pra gerar dados fake aleatórios.
# Útil pra testes que precisam de dados únicos a cada run.
- launchApp:
    clearState: false

# Gera email + nome aleatórios via JS embutido
- runScript: |
    output.email = `user-${Date.now()}@teste.com`;
    output.nome = `Aluno ${Math.floor(Math.random() * 10000)}`;
    output.senha = Math.random().toString(36).substring(2, 14);

- tapOn:
    text: "Funcional"
    optional: true
- tapOn:
    text: "Cadastro de Usuário"
    optional: true
- tapOn:
    text: "Nome"
    optional: true
- inputText: ${output.nome}
- tapOn:
    text: "Email"
    optional: true
- inputText: ${output.email}
- tapOn:
    text: "Senha"
    optional: true
- inputText: ${output.senha}
- tapOn:
    text: "Confirmar Senha"
    optional: true
- inputText: ${output.senha}
- tapOn:
    text: "Cadastrar"
    optional: true
- takeScreenshot: cadastro-fake-data
