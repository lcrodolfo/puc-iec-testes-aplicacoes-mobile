appId: com.apptestesmobile
name: 06-gestos-pinch-zoom
tags:
  - gestos
  - avancado
---
# Categoria 10 — Gestos: Pinch & Zoom
# Demonstra swipe + zoom em imagem
- launchApp:
    clearState: false
- tapOn:
    text: "Gestos"
    optional: true
- tapOn:
    text: "Pinch & Zoom"
    optional: true
- waitForAnimationToEnd
- assertVisible:
    text: "Zoom"
    optional: true
# Pinch out (zoom in) — Maestro syntax
- pinchToZoom:
    direction: OUT
- waitForAnimationToEnd
- pinchToZoom:
    direction: IN
- takeScreenshot: gestos-zoom
