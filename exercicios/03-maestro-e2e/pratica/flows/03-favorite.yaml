# Flow 3 — Favoritar na lista e verificar na tela de Favoritos (asserção cross-tela).
# Conceito: ação numa tela (favoritar) reflete em outra (Favoritos) + contador.

appId: com.puciec.cinefav

---
- launchApp

# Login
- tapOn:
    id: "login-email-input"
- inputText: "aluno@puc.br"

- tapOn:
    id: "login-password-input"
- inputText: "1234"

- tapOn:
    id: "login-submit-button"

- assertVisible:
    id: "movielist-screen"

# Favoritar Matrix
- tapOn:
    id: "movie-card-heart-603"

# Abrir Favoritos
- tapOn:
    id: "movielist-favorites-button"

# Validar filme favoritado
- assertVisible:
    id: "favorites-item-603"

# Validar contador
- assertVisible: "1 favorito"