# Flow 4 — Abrir o detalhe do filme, favoritar lá dentro e voltar pra lista.
# Conceito: navegação entre telas + asserções em cada uma.

appId: com.puciec.cinefav

---
- launchApp

# Login
- tapOn:
    id: "login-email-input"
- inputText: "aluno@puc.br"

- tapOn:
    id: "login-password-input"
- inputText: "1234"

- tapOn:
    id: "login-submit-button"

- assertVisible:
    id: "movielist-screen"

# Abrir detalhes do filme Matrix
- tapOn:
    id: "movie-card-603"

# Validar tela de detalhes
- assertVisible:
    id: "detail-screen"

# Favoritar o filme
- tapOn:
    id: "detail-favorite-button"

# Voltar para a lista
- tapOn:
    id: "detail-back-button"

# Validar retorno à lista
- assertVisible:
    id: "movielist-screen"